name: 🛑 Stop Proli Services
on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Select environment to stop'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  stop-railway:
    runs-on: ubuntu-latest
    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Stop Services in ${{ inputs.target_env }}
        env:
          RAILWAY_TOKEN: ${{ inputs.target_env == 'production' && secrets.RAILWAY_TOKEN_PRODUCTION || secrets.RAILWAY_TOKEN_STAGING }}
        run: |
          echo "Stopping services in ${{ inputs.target_env }}..."
          railway down --service api -y
          railway down --service worker -y
          railway down --service admin -y
