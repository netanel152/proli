events {
    worker_connections 1024;
}

http {
    # ----------------------------------------------------------------
    # Basic hardening
    # ----------------------------------------------------------------
    server_tokens off;                        # Hide nginx version
    client_max_body_size 50M;
    client_body_timeout 30s;
    client_header_timeout 30s;
    keepalive_timeout 65s;
    send_timeout 30s;

    # ----------------------------------------------------------------
    # Gzip compression
    # ----------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/javascript
        application/json application/javascript
        application/x-javascript text/xml application/xml;

    # ----------------------------------------------------------------
    # Rate limiting zones
    # ----------------------------------------------------------------
    # Webhook: tight limit — Green API sends at most ~1 msg/s per user
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=5r/s;
    # Admin panel: moderate limit
    limit_req_zone $binary_remote_addr zone=admin_limit:10m  rate=20r/s;

    # ----------------------------------------------------------------
    # Proxy timeouts (shared)
    # ----------------------------------------------------------------
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    60s;
    proxy_buffering       off;

    # ----------------------------------------------------------------
    # Security headers (applied in the server block below)
    # ----------------------------------------------------------------
    add_header X-Frame-Options         "SAMEORIGIN"        always;
    add_header X-Content-Type-Options  "nosniff"           always;
    add_header X-XSS-Protection        "1; mode=block"     always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "geolocation=(), microphone=()" always;

    server {
        listen 80;

        # ----------------------------------------------------------------
        # Admin Panel (Streamlit)
        # ----------------------------------------------------------------
        location / {
            limit_req zone=admin_limit burst=40 nodelay;

            proxy_pass http://admin:8501;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (Streamlit live reload)
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Streamlit needs longer read timeout for SSE streams
            proxy_read_timeout 3600s;
        }

        # ----------------------------------------------------------------
        # Webhook endpoint (Green API → FastAPI)
        # ----------------------------------------------------------------
        location /webhook {
            limit_req zone=webhook_limit burst=10 nodelay;

            proxy_pass http://api:8000/webhook;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ----------------------------------------------------------------
        # Health check (no rate limit — used by orchestrators)
        # ----------------------------------------------------------------
        location /health {
            proxy_pass http://api:8000/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # ----------------------------------------------------------------
        # Other FastAPI endpoints
        # ----------------------------------------------------------------
        location /api/ {
            limit_req zone=webhook_limit burst=20 nodelay;

            proxy_pass http://api:8000/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
