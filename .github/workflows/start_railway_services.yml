name: 🚀 Start Railway Proli Services
on:
  workflow_dispatch:
    inputs:
      target_env:
        description: 'Select environment to start.'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  start-railway:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy Services to ${{ inputs.target_env }}
        env:
          RAILWAY_TOKEN: ${{ inputs.target_env == 'production' && secrets.RAILWAY_TOKEN_PRODUCTION || secrets.RAILWAY_TOKEN_STAGING }}
        run: |
          echo "Starting services in ${{ inputs.target_env }}..."
          railway up --service api -d
          railway up --service worker -d
          railway up --service admin -d
          echo "All services started."
