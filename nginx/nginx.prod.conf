events {
    worker_connections 1024;
}

http {
    # ----------------------------------------------------------------
    # Basic hardening
    # ----------------------------------------------------------------
    server_tokens off;
    client_max_body_size 50M;
    client_body_timeout 30s;
    client_header_timeout 30s;
    keepalive_timeout 65s;
    send_timeout 30s;

    # ----------------------------------------------------------------
    # Gzip compression
    # ----------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/javascript
        application/json application/javascript
        application/x-javascript text/xml application/xml;

    # ----------------------------------------------------------------
    # Rate limiting zones
    # ----------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=admin_limit:10m  rate=20r/s;

    # ----------------------------------------------------------------
    # Proxy timeouts (shared)
    # ----------------------------------------------------------------
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    60s;
    proxy_buffering       off;

    # ----------------------------------------------------------------
    # Security headers
    # ----------------------------------------------------------------
    add_header X-Frame-Options         "SAMEORIGIN"        always;
    add_header X-Content-Type-Options  "nosniff"           always;
    add_header X-XSS-Protection        "1; mode=block"     always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "geolocation=(), microphone=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ----------------------------------------------------------------
    # HTTP → HTTPS redirect + Let's Encrypt ACME challenge
    # ----------------------------------------------------------------
    server {
        listen 80;
        server_name proli.me www.proli.me;

        # Let's Encrypt webroot challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ----------------------------------------------------------------
    # HTTPS — main server
    # ----------------------------------------------------------------
    server {
        listen 443 ssl;
        server_name proli.me www.proli.me;

        ssl_certificate     /etc/letsencrypt/live/proli.me/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/proli.me/privkey.pem;

        # Modern TLS — disable old protocols
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ----------------------------------------------------------------
        # Admin Panel (Streamlit) — default route
        # ----------------------------------------------------------------
        location / {
            limit_req zone=admin_limit burst=40 nodelay;

            proxy_pass http://admin:8501;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (Streamlit)
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
        }

        # ----------------------------------------------------------------
        # Webhook endpoint (Green API → FastAPI)
        # ----------------------------------------------------------------
        location /webhook {
            limit_req zone=webhook_limit burst=10 nodelay;

            proxy_pass http://api:8000/webhook;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ----------------------------------------------------------------
        # Health check
        # ----------------------------------------------------------------
        location /health {
            proxy_pass http://api:8000/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # ----------------------------------------------------------------
        # Other FastAPI endpoints
        # ----------------------------------------------------------------
        location /api/ {
            limit_req zone=webhook_limit burst=20 nodelay;

            proxy_pass http://api:8000/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
